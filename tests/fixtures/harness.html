<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bubble Cursor — test harness</title>
  <link rel="icon" href="data:,">
  <!-- Served from the repo root, so plugin assets resolve at /bubble-cursor/... -->
  <link rel="stylesheet" href="/bubble-cursor/assets/css/bubble-cursor.css">
  <style>
    body { margin: 0; height: 100vh; background: #050505; }
    /* right half white — lets the auto-contrast check see light vs dark */
    .half { position: fixed; top: 0; right: 0; width: 50%; height: 100%; background: #fff; }
    .portfolio-item { position: fixed; left: 100px; top: 250px; width: 200px; height: 150px; overflow: hidden; }
    .portfolio-item img { width: 100%; height: 100%; object-fit: cover; }
    .btn { position: fixed; left: 500px; top: 300px; width: 200px; height: 100px; background: #333; display: block; }
  </style>
</head>
<body>
  <div class="half"></div>
  <div class="portfolio-item">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==">
  </div>
  <a class="btn" href="#x"></a>

  <!-- The runner sets window.__BC per scenario via addInitScript (runs first). -->
  <script>window.BubbleCursorSettings = window.__BC || {};</script>
  <script src="/bubble-cursor/assets/js/fluid-cursor.js"></script>
  <script src="/bubble-cursor/assets/js/bubble-cursor.js"></script>
</body>
</html>
